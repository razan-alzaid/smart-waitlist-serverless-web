<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

<h2>👨‍🍳 لوحة التحكم</h2>

<!-- إحصائيات -->
<div class="stats">
  <div>🟡 انتظار: <span id="waitingCount">0</span></div>
  <div>🟢 جاهزة: <span id="readyCount">0</span></div>
  <div>🔴 ملغية: <span id="cancelCount">0</span></div>
</div>

<!-- أدوات -->
<input id="search" placeholder="🔍 بحث بالاسم أو الرقم" oninput="getList()">

<select id="filter" onchange="getList()">
  <option value="ALL">الكل</option>
  <option value="WAITING">WAITING</option>
  <option value="READY">READY</option>
  <option value="CANCELLED">CANCELLED</option>
</select>

<br>

<button class="primary" onclick="getList()">🔄 تحديث</button>
<label style="font-size:12px">
  <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()"> تحديث تلقائي
</label>

<div id="list"></div>

</div>

<script src="script.js"></script>
</body>
</html>
